{% extends "base.html" %}
{% block title %}Add Student - Face Attendance{% endblock %}

{% block content %}
  <h1>Add Student</h1>
  <p class="subtitle">Register a new student and upload a clear, front-facing photo.</p>

  <div class="card" style="max-width:520px">
    <form method="POST" enctype="multipart/form-data">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Aditi Sharma">
      </div>

      <div class="field">
        <label for="roll_number">Roll Number</label>
        <input type="text" id="roll_number" name="roll_number" required placeholder="e.g. 22BTCS101">
      </div>

      <div class="field">
        <label for="image">Face Image (PNG / JPG)</label>
        <input type="file" id="image" name="image" accept="image/png,image/jpeg" required>
      </div>

      <div style="display:flex; gap:0.75rem; margin-top:1rem;">
        <button type="submit" class="btn btn-primary">Save Student</button>
        <a href="{{ url_for('list_students') }}" class="btn btn-link">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
