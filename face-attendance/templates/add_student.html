{% extends "base.html" %}
{% block title %}FACE ID ENROLLMENT - Face Attendance{% endblock %}

{% block content %}
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<div class="container" style="max-width: 600px;">
    <h1>Face ID Enrollment</h1>
    <p class="subtitle">System will automatically detect you. Place your face in the oval.</p>

    <div class="card" style="text-align: center; padding: 2.5rem; position: relative; overflow: hidden;">
        <div id="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); opacity: 0; z-index: 5; pointer-events: none;"></div>

        <div id="enrollment-ui" style="position: relative; width: 340px; height: 340px; margin: 0 auto 2rem; border-radius: 50%; border: 6px solid #1e293b; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.2);">
            <video id="video" width="340" height="340" autoplay playsinline muted style="object-fit: cover; transform: scaleX(-1);"></video>
            
            <div id="oval-overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 260px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; box-shadow: 0 0 0 1000px rgba(15, 23, 42, 0.7); pointer-events: none; transition: all 0.4s ease;">
                <div id="oval-glow" style="position: absolute; inset: -3px; border-radius: 50%; border: 3px solid transparent; transition: all 0.4s;"></div>
            </div>
            
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
                <svg width="340" height="340" style="transform: rotate(-90deg);">
                    <circle cx="170" cy="170" r="165" fill="transparent" stroke="#1e293b" stroke-width="10"></circle>
                    <circle id="progress-circle" cx="170" cy="170" r="165" fill="transparent" stroke="var(--primary)" stroke-width="10" stroke-dasharray="1036" stroke-dashoffset="1036" style="transition: stroke-dashoffset 0.6s ease; stroke-linecap: round;"></circle>
                </svg>
            </div>
        </div>

        <div id="instruction-box" style="margin-bottom: 2rem;">
            <div id="status-msg" style="font-weight: 700; font-size: 1.25rem; color: var(--text); margin-bottom: 0.5rem;">Connecting...</div>
            <div id="sub-msg" style="font-size: 0.9rem; color: var(--text-secondary);">Initializing System</div>
        </div>

        <form id="enrollment-form" action="{{ url_for('add_student') }}" method="POST" enctype="multipart/form-data">
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div style="flex: 1; text-align: left;">
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 0.5rem;">Full Name</label>
                    <input type="text" name="name" id="student_name" required placeholder="Student Name" style="width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius); outline: none;">
                </div>
                <div style="flex: 1; text-align: left;">
                    <label style="display: block; font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 0.5rem;">Roll Number</label>
                    <input type="text" name="roll_number" id="roll_number" required placeholder="e.g. 24N81A" style="width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: var(--radius); outline: none;">
                </div>
            </div>

            <input type="file" name="image_front" id="input_front" style="display:none;">
            <input type="file" name="image_left" id="input_left" style="display:none;">
            <input type="file" name="image_right" id="input_right" style="display:none;">

            <button type="submit" id="submit-btn" class="btn" style="width: 100%; padding: 1.25rem; display: none; background: var(--success);">Register Student Profile</button>
        </form>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const statusMsg = document.getElementById('status-msg');
    const subMsg = document.getElementById('sub-msg');
    const oval = document.getElementById('oval-overlay');
    const ovalGlow = document.getElementById('oval-glow');
    const progressCircle = document.getElementById('progress-circle');
    const scanLine = document.getElementById('scan-line');
    const submitBtn = document.getElementById('submit-btn');
    const dashArray = 1036;

    let isEnrolled = false;
    let sequenceStarted = false;
    let modelsLoaded = false;
    let hasError = false;

    async function startSystem() {
        // Start camera first
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            statusMsg.innerText = "Camera Active";
        } catch (err) {
            hasError = true;
            statusMsg.innerText = "Camera Error";
            statusMsg.style.color = "var(--danger)";
            subMsg.innerText = "Please allow camera access and refresh.";
            return;
        }

        // Load Models
        try {
            subMsg.innerText = "Loading AI models...";
            const MODEL_URL = 'https://vladmandic.github.io/face-api/model/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            modelsLoaded = true;
            statusMsg.innerText = "System Ready";
            statusMsg.style.color = "var(--success)";
            subMsg.innerText = "Please position your face in the oval.";
            detectFace();
        } catch (err) {
            hasError = true;
            statusMsg.innerText = "AI Error";
            statusMsg.style.color = "var(--danger)";
            subMsg.innerText = "Failed to load models. Try refreshing.";
        }
    }

    async function detectFace() {
        if (sequenceStarted || isEnrolled || hasError) return;

        const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 }));
        
        if (detections) {
            const box = detections.box;
            if (box.width > 120) {
                ovalGlow.style.borderColor = "var(--success)";
                oval.style.borderColor = "var(--success)";
                
                if (document.getElementById('student_name').value && document.getElementById('roll_number').value) {
                    startAutoSequence();
                } else {
                    subMsg.innerText = "Enter Name & Roll to unlock enrollment";
                }
            } else {
                ovalGlow.style.borderColor = "var(--primary)";
                oval.style.borderColor = "rgba(255,255,255,0.2)";
                subMsg.innerText = "Get closer and center your face";
            }
        } else {
            ovalGlow.style.borderColor = "transparent";
            subMsg.innerText = "Searching for face...";
        }
        requestAnimationFrame(detectFace);
    }

    async function startAutoSequence() {
        sequenceStarted = true;
        statusMsg.innerText = "Face Locked!";
        subMsg.innerText = "Starting Enrollment...";
        
        await runStep("Front View", "Look straight ahead", 33, 'front');
        await runStep("Left View", "Turn your head to the LEFT", 66, 'left');
        await runStep("Right View", "Turn your head to the RIGHT", 100, 'right');

        statusMsg.innerText = "Enrollment Complete!";
        subMsg.innerText = "Click the button below to save";
        submitBtn.style.display = "block";
    }

    async function runStep(title, instruction, progress, angle) {
        statusMsg.innerText = title;
        subMsg.innerText = instruction;
        scanLine.style.opacity = "1";
        await animateScan();
        captureImage(angle);
        progressCircle.style.strokeDashoffset = dashArray - (progress / 100 * dashArray);
        await new Promise(r => setTimeout(r, 800));
    }

    function animateScan() {
        return new Promise(resolve => {
            scanLine.animate([{ top: '0%' }, { top: '100%' }], { duration: 1200, iterations: 1 }).onfinish = resolve;
        });
    }

    function captureImage(angle) {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 640;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, 640, 640);
        canvas.toBlob((blob) => {
            const file = new File([blob], `shot_${angle}.jpg`, { type: "image/jpeg" });
            const dt = new DataTransfer();
            dt.items.add(file);
            document.getElementById(`input_${angle}`).files = dt.files;
        }, 'image/jpeg', 0.8);
    }

    startSystem();
</script>
{% endblock %}
