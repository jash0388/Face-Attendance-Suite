{% extends "base.html" %}
{% block title %}Long-Range Scanner - Face Attendance{% endblock %}

{% block content %}
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="margin:0; letter-spacing:-1px;">Biometric <span style="font-weight:300;">Scanner</span></h1>
        <p class="subtitle" style="margin:0;">High-precision long-range face detection active.</p>
    </div>
    <div id="perf-badge" style="background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 800; font-size: 0.7rem; display: none;">-- MS / -- FPS</div>
  </div>

  <div class="card" style="padding: 1.5rem;">
    <div id="mode-selector" style="margin-bottom: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
      <button id="mode-browser-btn" class="btn active" onclick="switchScannerMode('browser')">Local Camera</button>
      <button id="mode-cctv-btn" class="btn" onclick="switchScannerMode('cctv')">CCTV Stream</button>
      
      <div id="cctv-config" style="display:none; gap:0.5rem; align-items:center;">
        <input type="text" id="rtsp-url" class="btn" style="text-transform:none; width:280px; text-align:left;" placeholder="rtsp://url...">
        <button class="btn" onclick="applyCctv()" style="background: var(--success);">Connect</button>
      </div>

      <div style="flex-grow: 1;"></div>

      <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span style="font-size: 0.7rem; font-weight: 800; color: var(--text-secondary);">SCAN RANGE:</span>
          <select id="quality-select" class="btn" style="text-transform:none; padding: 0.5rem 1rem;">
            <option value="160">Standard (Near)</option>
            <option value="320">Long Range (Medium)</option>
            <option value="416">Sniper Mode (Distant)</option>
            <option value="512" selected>Ultra-Range (Extreme)</option>
          </select>
      </div>
    </div>

    <div style="position: relative; width: 100%; max-width: 1000px; margin: 0 auto; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
        <video id="video" autoplay muted playsinline style="width: 100%; height: auto; display: block;"></video>
        <img id="cctv-stream" style="width: 100%; height: auto; display: none;">
        <canvas id="overlay" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        
        <div id="status-overlay" style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 0.5rem 1rem; border-radius: 8px; color: #fff; font-weight: 700; font-size: 0.8rem; border-left: 4px solid var(--primary);">
            SYSTEM: INITIALIZING...
        </div>

        <div style="position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px;">
            <button id="start-btn" class="btn" style="background: var(--primary); padding: 0.8rem 2rem;" disabled>START SCAN</button>
            <button id="stop-btn" class="btn" style="background: var(--danger); padding: 0.8rem 2rem; display: none;">STOP SCAN</button>
        </div>
    </div>
  </div>

  <div class="card" style="margin-top: 2rem;">
    <h2 style="font-size: 1rem; margin-bottom: 1rem;">Live Access Log</h2>
    <div id="recognized-list" style="max-height: 300px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;">
        <div id="recognized-empty" style="color: var(--text-secondary);">[ WAITING FOR BIOMETRIC DATA ]</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    'use strict';
    const MODEL_URL       = 'https://vladmandic.github.io/face-api/model/';
    const STUDENTS_URL    = "{{ url_for('api_students') }}";
    const MARK_URL        = "{{ url_for('api_mark_attendance') }}";
    const MATCH_THRESHOLD = 0.42; 

    const statusOverlay = document.getElementById('status-overlay');
    const startBtn     = document.getElementById('start-btn');
    const stopBtn      = document.getElementById('stop-btn');
    const video        = document.getElementById('video');
    const overlay      = document.getElementById('overlay');
    const perfBadge    = document.getElementById('perf-badge');
    const qualitySel   = document.getElementById('quality-select');
    const recList      = document.getElementById('recognized-list');
    const recEmpty     = document.getElementById('recognized-empty');
    const cctvStream   = document.getElementById('cctv-stream');

    let scannerMode = 'browser';
    let matcher = null;
    let stream = null;
    let detectionRunning = false;
    let lastDetections = [];
    const recognizedThisSession = new Set();

    const setStatus = t => { statusOverlay.textContent = `SYSTEM: ${t.toUpperCase()}`; };

    async function init() {
        try {
            setStatus('Loading Long-Range AI...');
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            setStatus('Syncing Database...');
            const r = await fetch(STUDENTS_URL);
            const students = await r.json();

            if (students.length > 0) {
                const labeled = [];
                for (const s of students) {
                    const img = await faceapi.fetchImage(s.image_url);
                    const fullDesc = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    if (fullDesc) labeled.push(new faceapi.LabeledFaceDescriptors(`${s.name}|${s.roll_number}`, [fullDesc.descriptor]));
                }
                if (labeled.length > 0) {
                    matcher = new faceapi.FaceMatcher(labeled, MATCH_THRESHOLD);
                }
            }

            setStatus('System Ready');
            startBtn.disabled = false;
        } catch (e) {
            setStatus('ERROR: ' + e.message);
        }
    }

    function switchScannerMode(mode) {
        if (detectionRunning) stopCamera();
        scannerMode = mode;
        document.getElementById('mode-browser-btn').classList.toggle('active', mode === 'browser');
        document.getElementById('mode-cctv-btn').classList.toggle('active', mode === 'cctv');
        document.getElementById('cctv-config').style.display = mode === 'cctv' ? 'flex' : 'none';
        video.style.display = mode === 'browser' ? 'block' : 'none';
        cctvStream.style.display = mode === 'cctv' ? 'block' : 'none';
    }

    async function applyCctv() {
        const url = document.getElementById('rtsp-url').value;
        const res = await fetch('/api/config-camera', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: url })
        });
        if (res.ok) setStatus('CCTV Source Applied');
    }

    async function startCamera() {
        if (scannerMode === 'cctv') {
            cctvStream.src = '/video_feed?t=' + Date.now();
            detectionRunning = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            return;
        }
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            await video.play();
            
            overlay.width = video.clientWidth;
            overlay.height = video.clientHeight;

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            perfBadge.style.display = 'block';
            detectionRunning = true;
            detectionLoop();
            renderLoop();
        } catch (e) {
            setStatus('CAMERA ERROR');
        }
    }

    function stopCamera() {
        detectionRunning = false;
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
        cctvStream.src = '';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
    }

    async function detectionLoop() {
        while (detectionRunning) {
            if (video.readyState < 2) { await new Promise(r => setTimeout(r, 100)); continue; }
            
            const t0 = performance.now();
            // SSD Mobilenet is MUCH more accurate for distant faces
            const detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }))
                .withFaceLandmarks().withFaceDescriptors();
            
            const t1 = performance.now();
            perfBadge.innerText = `${Math.round(t1 - t0)}MS / ${Math.round(1000/(t1-t0))}FPS`;

            const sx = overlay.width / video.videoWidth;
            const sy = overlay.height / video.videoHeight;

            lastDetections = detections.map(d => {
                const match = matcher ? matcher.findBestMatch(d.descriptor) : null;
                const isKnown = match && match.label !== 'unknown';
                const [name, roll] = isKnown ? match.label.split('|') : ['UNKNOWN', ''];
                
                if (isKnown && !recognizedThisSession.has(match.label)) {
                    recognizedThisSession.add(match.label);
                    logRecognition(name, roll);
                    fetch(MARK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, roll_number: roll })
                    });
                }

                const { x, y, width, height } = d.detection.box;
                return { x: x * sx, y: y * sy, w: width * sx, h: height * sy, label: isKnown ? name.toUpperCase() : 'UNKNOWN' };
            });

            await new Promise(r => setTimeout(r, 100));
        }
    }

    function renderLoop() {
        if (!detectionRunning) return;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        
        lastDetections.forEach(d => {
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            // Technical Corner Brackets
            const len = 20;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y + len); ctx.lineTo(d.x, d.y); ctx.lineTo(d.x + len, d.y);
            ctx.moveTo(d.x + d.w - len, d.y); ctx.lineTo(d.x + d.w, d.y); ctx.lineTo(d.x + d.w, d.y + len);
            ctx.stroke();

            ctx.fillStyle = '#3b82f6';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(`> ${d.label}`, d.x, d.y - 10);
        });
        requestAnimationFrame(renderLoop);
    }

    function logRecognition(name, roll) {
        if (recEmpty) recEmpty.remove();
        const div = document.createElement('div');
        div.style.padding = '0.5rem 0';
        div.style.borderBottom = '1px solid #eee';
        div.innerHTML = `<span style="color:var(--primary)">[${new Date().toLocaleTimeString()}]</span> IDENTIFIED: <b>${name}</b> (${roll})`;
        recList.prepend(div);
    }

    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
    init();
  </script>
{% endblock %}
